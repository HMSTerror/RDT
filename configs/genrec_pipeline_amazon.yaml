dataset:
  name: amazon_music
  raw_root: data/Amazon_Music_And_Instruments
  image_root: data/images
  reviews_path: data/Amazon_Music_And_Instruments/Musical_Instruments_5.json
  meta_path: data/Amazon_Music_And_Instruments/meta_Musical_Instruments.json

download:
  enabled: true
  script: scripts/download_amazon_music_dataset.sh

preprocessing:
  enabled: true
  script: scripts/preprocess_amazon_minimal.sh
  output_root: buffer/amazon_music_real
  split_mode: leave_last_two
  history_len: 50
  chunk_size: 1000

embeddings:
  text:
    enabled: true
    source_type: text
    output_path: data/Amazon_Music_And_Instruments/item_embeddings_text.npy
    generator_script: scripts/generate_amazon_item_embeddings.sh
  image:
    enabled: true
    source_type: image
    output_path: data/Amazon_Music_And_Instruments/item_embeddings_image.npy
    generator_script: scripts/generate_amazon_image_embeddings.sh
  cf:
    enabled: false
    source_type: cf
    output_path: data/Amazon_Music_And_Instruments/item_embeddings_cf.npy
    generator_script: scripts/generate_amazon_cf_item_embeddings.sh
    method: item2vec
    window_size: 5
    negative_samples: 10
    epochs: 5
    batch_size: 4096
    learning_rate: 1.0e-3
  vlm:
    enabled: false
    source_type: vlm
    output_path: data/Amazon_Music_And_Instruments/item_embeddings_vlm.npy

fusion:
  enabled: false
  strategy: weighted_sum
  output_path: data/Amazon_Music_And_Instruments/item_embeddings_fused.npy
  normalize_each: true
  normalize_output: true
  weights:
    text: 1.0
    image: 1.0
    cf: 1.0
    vlm: 1.0

quantization:
  enabled: true
  method: pq
  input_path: data/Amazon_Music_And_Instruments/item_embeddings_text.npy
  output_root: data/Amazon_Music_And_Instruments/semantic_ids_pq
  num_subspaces: 4
  codebook_size: 256
  levels: 4
  branching_factor: 16
  max_iter: 25
  seed: 0

tokenized_samples:
  enabled: true
  output_root: data/Amazon_Music_And_Instruments/tokenized_semantic_ids
  splits: train,val,test
  pad_token_id: 0
  mask_token_id: 1
  cls_token_id: 2
  sep_token_id: 3
  eos_token_id: 4
