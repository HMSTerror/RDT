common:
  # Number of historical interactions used as context.
  img_history_size: 50
  # RecSys-DiT predicts exactly one target embedding token.
  action_chunk_size: 1
  # Target item embedding dimension.
  state_dim: 128


dataset:
  # Preferred training mode: load from the lightweight preprocessed buffer.
  buffer_root: /data/amazon_music_buffer
  # Directory that stores item images as {asin}.jpg (or related formats).
  image_root: /data/images
  # Must match buffer/stats.json; train.py will also auto-sync from stats when available.
  history_len: 50
  # Only used if you want to cap samples for debugging. Set 0 for full dataset.
  max_samples: 0
  # Legacy text length knob consumed by train.py when constructing the T5 embedder.
  tokenizer_max_length: 64
  # Optional dataset-side text formatting controls.
  max_review_chars: 160
  max_text_history: 50
  min_history_len: 1
  ctrl_freq: 1
  # Additional modality-level dropout on top of the global cond_mask_prob CLI flag.
  text_branch_mask_prob: 0.1
  image_branch_mask_prob: 0.1


model:
  # Dimensions of upstream modality encoders before projection into hidden_size.
  img_token_dim: 1152
  state_token_dim: 128

  rdt:
    # train/train.py will force hidden_size=1024 for RecSys-DiT.
    hidden_size: 1024
    # A reasonable starting point on a single or few GPUs.
    depth: 12
    num_heads: 16

  noise_scheduler:
    num_train_timesteps: 1000
    # Sampling path in RDTRunner.sample() uses DDIM with 50 steps.
    num_inference_timesteps: 50
    beta_schedule: squaredcos_cap_v2
    prediction_type: sample
    clip_sample: false
