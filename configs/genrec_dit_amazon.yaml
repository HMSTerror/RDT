experiment_name: genrec_dit_amazon

data:
  dataset_name: amazon_music
  split_root: buffer/amazon_music_real
  tokenized_root: data/Amazon_Music_And_Instruments/tokenized_semantic_ids
  semantic_id_root: data/Amazon_Music_And_Instruments/semantic_ids_pq
  train_split: train
  valid_split: val
  test_split: test
  history_len: 50

representation:
  embedding_source: data/Amazon_Music_And_Instruments/item_embeddings.npy
  embedding_dim: 128

tokenization:
  enabled: true
  semantic_id_method: residual_quantization
  code_len: 4
  vocab_sizes: [256, 256, 256, 256]
  pad_token_id: 0
  mask_token_id: 1
  cls_token_id: 2
  sep_token_id: 3
  eos_token_id: 4

backbone:
  name: genrec_dit
  base_runner: rdt
  hidden_size: 1024
  depth: 12
  num_heads: 16
  max_seq_len: 256
  dropout: 0.0

conditioning:
  use_text: true
  use_image: true
  use_cf: true
  text_embedding_path: data/Amazon_Music_And_Instruments/item_embeddings_text.npy
  image_embedding_path: data/Amazon_Music_And_Instruments/item_embeddings_image.npy
  cf_embedding_path: data/Amazon_Music_And_Instruments/item_embeddings_cf.npy
  use_text_history: true
  use_text_pooled: true
  use_target_text: false
  use_image_history: true
  use_image_pooled: true
  use_cf_history: true
  use_cf_pooled: true
  use_target_cf: false
  use_target_image: false

training:
  objective: masked_semantic_id
  batch_size: 16
  num_train_epochs: 1
  learning_rate: 1.0e-5
  weight_decay: 0.01
  lr_scheduler: linear
  warmup_steps: 500
  max_train_steps: 10000
  label_smoothing: 0.0
  restrict_target_vocab: true
  eval_steps: 500
  save_steps: 1000
  aux_diffusion_loss_weight: 0.0
  aux_ranking_loss_weight: 0.0

inference:
  decode_strategy: beam
  beam_size: 20
  use_prefix_trie: true
  max_decode_len: 4

evaluation:
  batch_size: 16
  topk: [5, 10, 20]
  metrics: [hit, ndcg, mrr]
  exclude_history_items: true
  group_strategy: equal_items
  frequency_source_split: train
